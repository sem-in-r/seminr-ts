# Tag-gated npm publish via trusted publishing (OIDC). Inert until the
# trusted publisher is configured on npmjs.com for this repo/workflow —
# which requires the package to already exist, so v0.1.0 is published
# manually once and this workflow takes over from v0.1.1 (plan Q6).
name: Release

on:
  push:
    tags: ["v*"]

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest
      # The publish step uses the npm CLI: trusted publishing needs
      # npm >= 11.5.1 (provenance is attested automatically), which bun
      # does not support yet (oven-sh/bun#24855). Everything else stays bun.
      - uses: actions/setup-node@v5
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: bun install --frozen-lockfile
      - run: bun run build
      - run: bun test
      - run: bun run smoke:pack
      - run: npm publish --access public
